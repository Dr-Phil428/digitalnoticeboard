<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="forgot-password.css">
</head>
<body>
    <div id="toast" class="toast"></div>
  <div class="forgot-card">
    <h2>🔑 Reset Password</h2>
    <form id="resetForm" action="reset-password.php" method="POST">
      <label>User ID:</label>
      <div class="input-group">
        <input type="text" id="userId" name="user_id" placeholder="Enter your User ID" required>
      </div>


        <div class="password-wrapper">
      <label>New Password:</label>
      <div class="input-group">
      <input type="password" id="newPassword"  name="newPassword" required>
      <span class="toggle-password" data-target="newPassword">
 <img src="eye-solid-full.svg" alt="Toggle password" width="20" height="20">
     </span>

      </div>
      <div id="newPasswordRequirements" class="requirements">
      <p>Your password should contain:</p>
      <ul>
        <li id="new-lowercase">A lowercase letter (a)</li>
        <li id="new-uppercase">An uppercase letter (A)</li>
        <li id="new-number">A number</li>
        <li id="new-special">A special character (!@#$)</li>
        <li id="new-length">Minimum 6 characters</li>
      </ul>
    </div>
        </div>


      <label>Confirm Password:</label>
      <div class="input-group">
      <input type="password" id="confirmPassword" name="confirmPassword" required>
      <span class="toggle-password" data-target="confirmPassword">
       <img src="eye-solid-full.svg" alt="Toggle password" width="20" height="20">

    </span>
      </div>
      <button type="submit" class="reset-btn">Reset Password</button>
    </form>
    <p id="passwordMessage" class="error-msg"></p>
    <p id="successMessage" class="success-msg"></p>
  </div>
  <script src="forgot-password.js"></script>
</body>
</html>
